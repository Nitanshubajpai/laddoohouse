<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Login — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bd:#1C0A00;--br:#3B1507;--gold:#C9932A;--gl:#E8B96A;--bg:rgba(201,147,42,.3);--bgs:rgba(201,147,42,.6);}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Jost',sans-serif;background:var(--bd);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:var(--br);border:1px solid var(--bg);padding:44px;width:min(380px,90%);text-align:center;}
.lo{font-family:'Cormorant Garamond',serif;font-size:48px;color:var(--gold);margin-bottom:8px;}
h2{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gl);margin-bottom:4px;}
p{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:1px;margin-bottom:28px;}
input{width:100%;padding:12px 14px;border:1px solid var(--bg);background:rgba(255,255,255,.05);color:white;font-family:'Jost',sans-serif;font-size:14px;outline:none;margin-bottom:10px;}
input:focus{border-color:var(--gold);}
input::placeholder{color:rgba(255,255,255,.25);}
.btn{width:100%;background:var(--gold);color:var(--bd);border:none;padding:13px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Jost',sans-serif;letter-spacing:2px;text-transform:uppercase;margin-top:6px;}
.err{background:rgba(139,32,32,.3);color:#EF9A9A;border:1px solid rgba(139,32,32,.5);padding:10px;font-size:13px;margin-bottom:14px;}
</style></head><body>
<div class="box">
  <div class="lo">❧</div>
  <h2>The Laddoo House</h2>
  <p>Admin Dashboard</p>
  {% if messages %}{% for m in messages %}<div class="err">{{ m }}</div>{% endfor %}{% endif %}
  <form method="post">{% csrf_token %}
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit" class="btn">Sign In</button>
  </form>
</div>
</body></html>
