<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — The Laddoo House Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
{% load static %}
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#F5ECD8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.box{background:#FFFBF4;border:2px solid #E8B96A;border-radius:20px;padding:48px 44px;width:min(420px,100%);text-align:center;box-shadow:0 8px 40px rgba(201,147,42,.12);}
.logo{margin-bottom:6px;}
.logo img{height:90px;width:auto;}
h2{font-family:'Unbounded',sans-serif;font-size:14px;color:#1E0D00;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}
p{font-size:11px;color:#8B6A50;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.divider{border:none;border-top:1px solid #EAD9C2;margin:0 0 28px;}
label{display:block;font-size:9px;color:#C9932A;letter-spacing:2px;text-transform:uppercase;font-weight:700;text-align:left;margin-bottom:6px;}
input{width:100%;padding:12px 14px;border:1.5px solid #EAD9C2;background:#fff;color:#1E0D00;font-family:'Inter',sans-serif;font-size:14px;outline:none;margin-bottom:16px;border-radius:10px;transition:border-color .2s;}
input:focus{border-color:#C9932A;}
input::placeholder{color:#C4A882;}
.btn{width:100%;background:#C9932A;color:#fff;border:none;padding:14px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:2px;text-transform:uppercase;margin-top:4px;border-radius:10px;transition:background .2s;}
.btn:hover{background:#A07520;}
.err{background:rgba(198,40,40,.08);color:#C62828;border:1px solid rgba(198,40,40,.25);padding:10px 14px;font-size:13px;margin-bottom:16px;border-radius:8px;}
</style>
</head>
<body>
<div class="box">
  <div class="logo"><img src="{% static 'css/laddoo.png' %}" alt="The Laddoo House"></div>
  <h2>The Laddoo House</h2>
  <p>Admin Panel</p>
  <hr class="divider">
  {% if messages %}{% for m in messages %}<div class="err">{{ m }}</div>{% endfor %}{% endif %}
  <form method="post">{% csrf_token %}
    <label>Username</label>
    <input type="text" name="username" placeholder="Enter username" required autofocus>
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter password" required>
    <button type="submit" class="btn">Sign In →</button>
  </form>
</div>
</body>
</html>
